# Builds self-contained Linux binaries (x64 + arm64) of Jellyking —
# frontend baked into wwwroot, .NET runtime bundled — and attaches
# ready-to-install tarballs to a GitHub Release on every v* tag push.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (into src/Jellyking.Host/wwwroot)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained for linux-x64 and linux-arm64
        run: |
          for rid in linux-x64 linux-arm64; do
            echo "::group::Publish $rid"
            dotnet publish src/Jellyking.Host/Jellyking.Host.csproj \
              --configuration Release \
              --runtime "$rid" \
              --self-contained true \
              -p:PublishReadyToRun=false \
              -p:PublishTrimmed=false \
              --output "build/$rid/jellyking"
            # Ship the systemd unit inside the tarball so install is one extraction.
            cp deploy/jellyking.service "build/$rid/jellyking/jellyking.service"
            # Trim the heavy test/globalization sidecar we don't need on the server.
            rm -rf "build/$rid/jellyking/data" "build/$rid/jellyking/logs" 2>/dev/null || true
            mkdir -p dist
            tar -C "build/$rid" -czf "dist/jellyking-$rid.tar.gz" jellyking
            echo "::endgroup::"
          done

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: jellyking-build
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release with the tarballs
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
